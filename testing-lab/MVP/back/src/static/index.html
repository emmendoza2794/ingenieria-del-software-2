<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MVP Auth — Lab</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f1f5f9; min-height: 100vh; padding: 2rem; }
    h1 { text-align: center; color: #1e293b; margin-bottom: 2rem; font-size: 1.5rem; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; max-width: 860px; margin: 0 auto; }
    .card { background: #fff; border-radius: 12px; padding: 1.5rem; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    h2 { font-size: 1rem; color: #334155; margin-bottom: 1rem; padding-bottom: .5rem; border-bottom: 2px solid #e2e8f0; }
    label { display: block; font-size: .8rem; color: #64748b; margin-bottom: .25rem; margin-top: .75rem; }
    input {
      width: 100%; padding: .55rem .75rem; border: 1px solid #cbd5e1;
      border-radius: 7px; font-size: .9rem; outline: none;
      transition: border-color .2s;
    }
    input:focus { border-color: #6366f1; }
    button {
      margin-top: 1.1rem; width: 100%; padding: .65rem;
      background: #6366f1; color: #fff; border: none;
      border-radius: 7px; font-size: .9rem; font-weight: 600;
      cursor: pointer; transition: background .2s;
    }
    button:hover { background: #4f46e5; }
    button:disabled { background: #a5b4fc; cursor: not-allowed; }
    .msg {
      margin-top: .9rem; padding: .6rem .85rem; border-radius: 7px;
      font-size: .82rem; display: none; word-break: break-word;
    }
    .msg.ok  { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; display: block; }
    .msg.err { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; display: block; }
    .token-box {
      margin-top: .75rem; background: #f8fafc; border: 1px solid #e2e8f0;
      border-radius: 7px; padding: .6rem; font-size: .72rem;
      font-family: monospace; word-break: break-all; display: none;
    }
    .me-card { grid-column: span 2; }
    .user-info { display: grid; grid-template-columns: repeat(3, 1fr); gap: .75rem; margin-top: .75rem; }
    .info-item { background: #f8fafc; border-radius: 7px; padding: .6rem .85rem; }
    .info-item span { display: block; font-size: .72rem; color: #94a3b8; }
    .info-item strong { font-size: .9rem; color: #1e293b; }
  </style>
</head>
<body>
<h1>MVP Auth — Formulario de laboratorio</h1>

<div class="grid">

  <!-- REGISTRO -->
  <div class="card">
    <h2>Registro</h2>
    <form id="form-register">
      <label>Nombre completo</label>
      <input id="reg-name" type="text" placeholder="Ana García" required />
      <label>Correo electrónico</label>
      <input id="reg-email" type="email" placeholder="ana@ejemplo.com" required />
      <label>Contraseña</label>
      <input id="reg-password" type="password" placeholder="Mínimo 6 caracteres" required />
      <button type="submit" id="btn-register">Registrarse</button>
    </form>
    <div class="msg" id="msg-register"></div>
  </div>

  <!-- LOGIN -->
  <div class="card">
    <h2>Iniciar sesión</h2>
    <form id="form-login">
      <label>Correo electrónico</label>
      <input id="login-email" type="email" placeholder="ana@ejemplo.com" required />
      <label>Contraseña</label>
      <input id="login-password" type="password" placeholder="Tu contraseña" required />
      <button type="submit" id="btn-login">Entrar</button>
    </form>
    <div class="msg" id="msg-login"></div>
    <div class="token-box" id="token-display"></div>
  </div>

  <!-- PERFIL -->
  <div class="card me-card">
    <h2>Perfil del usuario autenticado</h2>
    <button id="btn-me">Obtener mi perfil</button>
    <div class="msg" id="msg-me"></div>
    <div class="user-info" id="user-info" style="display:none">
      <div class="info-item"><span>ID</span><strong id="me-id">—</strong></div>
      <div class="info-item"><span>Nombre</span><strong id="me-name">—</strong></div>
      <div class="info-item"><span>Email</span><strong id="me-email">—</strong></div>
    </div>
  </div>

</div>

<script>
  const API = 'http://localhost:8000';
  let storedToken = localStorage.getItem('token') || '';

  function showMsg(id, text, isOk) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = 'msg ' + (isOk ? 'ok' : 'err');
  }

  // ── REGISTRO ──────────────────────────────────────────
  document.getElementById('form-register').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btn-register');
    btn.disabled = true;

    const body = new FormData();
    body.append('name',     document.getElementById('reg-name').value);
    body.append('email',    document.getElementById('reg-email').value);
    body.append('password', document.getElementById('reg-password').value);

    try {
      const res = await fetch(`${API}/auth/register`, { method: 'POST', body });
      const data = await res.json();
      if (res.ok) {
        showMsg('msg-register', `✓ Usuario "${data.name}" registrado con ID ${data.id}`, true);
        document.getElementById('form-register').reset();
      } else {
        showMsg('msg-register', `Error ${res.status}: ${data.detail}`, false);
      }
    } catch {
      showMsg('msg-register', 'No se pudo conectar con el servidor', false);
    } finally {
      btn.disabled = false;
    }
  });

  // ── LOGIN ─────────────────────────────────────────────
  document.getElementById('form-login').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btn-login');
    btn.disabled = true;

    const body = new FormData();
    body.append('email',    document.getElementById('login-email').value);
    body.append('password', document.getElementById('login-password').value);

    try {
      const res = await fetch(`${API}/auth/login`, { method: 'POST', body });
      const data = await res.json();
      if (res.ok) {
        storedToken = data.access_token;
        localStorage.setItem('token', storedToken);
        showMsg('msg-login', '✓ Login exitoso. Token guardado.', true);
        const box = document.getElementById('token-display');
        box.textContent = storedToken;
        box.style.display = 'block';
      } else {
        showMsg('msg-login', `Error ${res.status}: ${data.detail}`, false);
      }
    } catch {
      showMsg('msg-login', 'No se pudo conectar con el servidor', false);
    } finally {
      btn.disabled = false;
    }
  });

  // ── PERFIL ────────────────────────────────────────────
  document.getElementById('btn-me').addEventListener('click', async () => {
    if (!storedToken) {
      showMsg('msg-me', 'Debes iniciar sesión primero', false);
      return;
    }
    try {
      const res = await fetch(`${API}/auth/me`, {
        headers: { 'Authorization': `Bearer ${storedToken}` }
      });
      const data = await res.json();
      if (res.ok) {
        document.getElementById('msg-me').className = 'msg';
        document.getElementById('me-id').textContent    = data.id;
        document.getElementById('me-name').textContent  = data.name;
        document.getElementById('me-email').textContent = data.email;
        document.getElementById('user-info').style.display = 'grid';
      } else {
        showMsg('msg-me', `Error ${res.status}: ${data.detail}`, false);
        document.getElementById('user-info').style.display = 'none';
      }
    } catch {
      showMsg('msg-me', 'No se pudo conectar con el servidor', false);
    }
  });
</script>
</body>
</html>
